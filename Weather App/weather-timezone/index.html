    <div id="controls-header">
      <strong>Weather / Timezone Globe</strong>
      <button id="controls-toggle" aria-label="Toggle controls">☰</button>
    </div>

      <div>
        <label
          ><input type="checkbox" id="togWeather" checked /> Weather
          overlay</label
        >
      </div>
      <div>
        <label
          ><input type="checkbox" id="togCountries" checked /> Country
          borders</label
        >
      </div>
      <div>
        <label
          ><input type="checkbox" id="togCities" checked /> City dots</label
        >
      </div>
      <div>
        Layer:

          <option value="clouds_new">Clouds</option>
          <option value="precipitation_new">Precipitation</option>
          <option value="temp_new">Temperature</option>
          <option value="wind_new">Wind</option>
          <option value="pressure_new">Pressure</option>
        </select>
      </div>
    </div>
    <!-- /controls-body -->
  </div>

      <div class="wc-row">

    // ── Day/Night shader ───────────────────────────────────────────────────────
    const VERT = `
      varying vec3 vNormal;
      varying vec2 vUv;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`;

    const FRAG = `
      #define PI 3.141592653589793
      uniform sampler2D dayTex;
      uniform sampler2D nightTex;
      uniform vec2 sunPos;
      uniform vec2 rotation;
      varying vec3 vNormal;
      varying vec2 vUv;

      float toRad(float a) { return a * PI / 180.0; }

      vec3 polar2cart(vec2 c) {
        float theta = toRad(90.0 - c.x);
        float phi   = toRad(90.0 - c.y);
        return vec3(sin(phi)*cos(theta), cos(phi), sin(phi)*sin(theta));
      }

      void main() {
        float iLon = toRad(rotation.x);
        float iLat = -toRad(rotation.y);
        mat3 rX = mat3(1,0,0, 0,cos(iLat),-sin(iLat), 0,sin(iLat),cos(iLat));
        mat3 rY = mat3(cos(iLon),0,sin(iLon), 0,1,0, -sin(iLon),0,cos(iLon));
        vec3 sun = rX * rY * polar2cart(sunPos);
        float d = dot(normalize(vNormal), normalize(sun));
        float blend = smoothstep(-0.1, 0.1, d);
        gl_FragColor = mix(texture2D(nightTex, vUv), texture2D(dayTex, vUv), blend);
      }`;

    const sunPosAt = (dt) => {
      const day = new Date(+dt).setUTCHours(0, 0, 0, 0);
      const t = solar.century(dt);
      return [
        ((day - dt) / 864e5) * 360 - 180 - solar.equationOfTime(t) / 4,
        solar.declination(t),
      ];
    };

    // ── OWM weather tiles → reproject Mercator → equirectangular texture ───────
    async function buildWeatherTexture(layer) {
      const zoom = 2;
      const ts = 256;
      const n = 1 << zoom; // 4 tiles per side

      // Step 1: stitch Mercator tiles into one canvas
      const mc = document.createElement("canvas");
      mc.width = mc.height = ts * n;
      const mCtx = mc.getContext("2d");

      await Promise.all(
        Array.from({ length: n * n }, (_, i) => {
          const x = i % n,
            y = Math.floor(i / n);
          return new Promise((res) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => {
              mCtx.drawImage(img, x * ts, y * ts);
              res();
            };
            img.onerror = res;
            img.src = `https://tile.openweathermap.org/map/${layer}/${zoom}/${x}/${y}.png?appid=${OWM_KEY}`;
          });
        }),
      );

      // Step 2: reproject from Web Mercator to equirectangular
      // (so the texture maps correctly onto the sphere without polar distortion)
      const sz = mc.width;
      const md = mCtx.getImageData(0, 0, sz, sz);
      const ec = document.createElement("canvas");
      ec.width = ec.height = sz;
      const eCtx = ec.getContext("2d");
      const ed = eCtx.createImageData(sz, sz);

      for (let py = 0; py < sz; py++) {
        // equirectangular: top = 90°N, bottom = 90°S
        const latRad = ((90 - (py / sz) * 180) * Math.PI) / 180;
        // convert geographic lat → Mercator pixel row
        const mercY = Math.round(
          sz *
            (0.5 -
              Math.log(Math.tan(Math.PI / 4 + latRad / 2)) / (2 * Math.PI)),
        );
        const clampedY = Math.max(0, Math.min(sz - 1, mercY));

        for (let px = 0; px < sz; px++) {
          const si = (clampedY * sz + px) * 4;
          const di = (py * sz + px) * 4;
          ed.data[di] = md.data[si];
          ed.data[di + 1] = md.data[si + 1];
          ed.data[di + 2] = md.data[si + 2];
          ed.data[di + 3] = md.data[si + 3];
        }
      }
      eCtx.putImageData(ed, 0, 0);
      return new CanvasTexture(ec);
    }

    // ── State ──────────────────────────────────────────────────────────────────
    let dt = +new Date();
    let globeMat = null;
    let weatherMesh = null;
    let countriesData = [];
    let searchPinCity = null; // search-result pin (non-listed cities only)

    const clockEl = document.getElementById("clock");
    const tooltipEl = document.getElementById("tooltip");

    // ── Globe ──────────────────────────────────────────────────────────────────
    const world = new Globe(
      document.getElementById("globeViz"),
    ).backgroundImageUrl(
      "//cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png",
    );

    // Pick texture set: downscaled images for mobile, full 8K for desktop.
    // Falls back to canvas-clamping if the chosen set still exceeds GPU limits.
    const isMobile =
      window.matchMedia("(max-width: 768px)").matches ||
      ("ontouchstart" in window && screen.width <= 1024);
    // Note: space in folder name must be percent-encoded for iOS Safari
    const texBase = isMobile
      ? "../../globe/downscaled%20for%20mobile/"
      : "../../globe/";

    function clampTexture(tex) {
      const maxSize = world.renderer().capabilities.maxTextureSize;
      const img = tex.image;
      if (img.width <= maxSize && img.height <= maxSize) return tex;
      const scale = maxSize / Math.max(img.width, img.height);
      const w = Math.floor(img.width * scale);
      const h = Math.floor(img.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      return new CanvasTexture(canvas);
    }

    function loadTexturePair(base) {
      return Promise.all([
        new TextureLoader().loadAsync(`${base}8k_earth_daymap.jpg`),
        new TextureLoader().loadAsync(`${base}8k_earth_nightmap.jpg`),
      ]);
    }

    // Day/Night material — if the mobile set fails (e.g. 404), fall back to 8K
    const texLoad = isMobile
      ? loadTexturePair(texBase).catch(() => loadTexturePair("../../globe/"))
      : loadTexturePair(texBase);

    texLoad.then(([dayTex, nightTex]) => {
      const safeDay = clampTexture(dayTex);
      const safeNight = clampTexture(nightTex);
      globeMat = new ShaderMaterial({
        uniforms: {
          dayTex: { value: safeDay },
          nightTex: { value: safeNight },
          sunPos: { value: new Vector2() },
          rotation: { value: new Vector2() },
        },
        vertexShader: VERT,
        fragmentShader: FRAG,
      });

      world
        .globeMaterial(globeMat)
        .onZoom(({ lng, lat }) =>
          globeMat.uniforms.rotation.value.set(lng, lat),
        );

      // Resolve the user's local IANA timezone once (falls back to UTC label)
      const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const localTzFmt = new Intl.DateTimeFormat("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false,
        timeZone: localTz,
      });
      // Derive a short UTC-offset label, e.g. "UTC+2" or "UTC-5"
      const localOffsetMin = -new Date().getTimezoneOffset();
      const localOffsetSign = localOffsetMin >= 0 ? "+" : "-";
      const localOffsetAbs = Math.abs(localOffsetMin);
      const localOffsetLabel =
        localOffsetAbs % 60 === 0
          ? `UTC${localOffsetSign}${localOffsetAbs / 60}`
          : `UTC${localOffsetSign}${String(Math.floor(localOffsetAbs / 60)).padStart(2, "0")}:${String(localOffsetAbs % 60).padStart(2, "0")}`;

      (function animate() {
        dt = Date.now();
        const timeStr = localTzFmt.format(new Date(dt));
        clockEl.textContent = `${localOffsetLabel} ${timeStr}`;
        globeMat.uniforms.sunPos.value.set(...sunPosAt(dt));
        requestAnimationFrame(animate);
      })();
    });

    // ── Weather overlay ────────────────────────────────────────────────────────
    async function loadWeather(layer) {
      const texture = await buildWeatherTexture(layer);
      const r = world.getGlobeRadius();
      const geo = new SphereGeometry(r * 1.005, 64, 64);
      const mat = new MeshPhongMaterial({
        map: texture,
        transparent: true,
        opacity: 0.65,
        depthWrite: false,
      });
      if (weatherMesh) world.scene().remove(weatherMesh);
      weatherMesh = new Mesh(geo, mat);
      if (document.getElementById("togWeather").checked)
        world.scene().add(weatherMesh);
    }

    // ── Country borders ────────────────────────────────────────────────────────
    fetch("../datasets/ne_110m_admin_0_countries.geojson")
      .then((r) => r.json())
      .then((data) => {
        countriesData = data.features;
        world
          .polygonsData(countriesData)
          .polygonAltitude(0.004)
          .polygonCapColor(() => "rgba(0,0,0,0)")
          .polygonSideColor(() => "rgba(50,120,220,0.7)")
          .polygonStrokeColor(() => "rgba(50,120,220,0.7)")
          .onPolygonHover((polygon) => {
            if (!polygon) {
              tooltipEl.style.display = "none";
              return;
            }
            const p = polygon.properties;
            // Use NaturalEarth label longitude (more accurate than centroid)
            const lng = p.LABEL_X ?? p.LON ?? 0;
            const utcOffset = Math.round(lng / 15);
            const sign = utcOffset >= 0 ? "+" : "";
            // Compute approximate local time by shifting UTC
            const localDate = new Date(dt + utcOffset * 3600000);
            const hh = String(localDate.getUTCHours()).padStart(2, "0");
            const mm = String(localDate.getUTCMinutes()).padStart(2, "0");
            tooltipEl.innerHTML =
              `<strong>${p.ADMIN || p.NAME}</strong><br>` +
              `≈ UTC${sign}${utcOffset}<br>` +
              `~${hh}:${mm} local`;
            tooltipEl.style.display = "block";
          })
          .onPolygonClick((_polygon, _ev, { lat, lng }) =>
            handleMapTap(lat, lng),
          );
      });

    // ── City dots — all cities ────────────────────────────────────────────────
    function updatePointsData() {
      world.pointsData(
        document.getElementById("togCities").checked ? CITIES : [],
      );
    }

    world
      .pointsData(CITIES)
      .pointLat((d) => d.lat)
      .pointLng((d) => d.lng)
      .pointAltitude(0.005)
      .pointRadius(0.25)
      .pointColor(() => "rgba(180,80,255,0.9)")
      .pointLabel(() => "") // suppress built-in tooltip; we use #tooltip
      .onPointHover((point) => {
        if (!point) {
          tooltipEl.style.display = "none";
          return;
        }
        tooltipEl.innerHTML = `<strong>${point.name}</strong>`;
        tooltipEl.style.display = "block";
      })
      .onPointClick((point) => {
        if (!point) return;
        fetchWeatherAt(point.lat, point.lng);
      });

    // ── HTML elements helper ───────────────────────────────────────────────────
    function getHtmlData() {
      const citiesOn = document.getElementById("togCities").checked;
      const base = citiesOn
        ? CITIES.filter((c) => CITIES_LABELED.has(c.name))
        : [];
      return searchPinCity ? [...base, searchPinCity] : base;
    }
    function updateHtmlData() {
      world.htmlElementsData(getHtmlData());
    }

    // ── City labels (labeled subset) + search pin ─────────────────────────────
    world
      .htmlElementsData(CITIES.filter((c) => CITIES_LABELED.has(c.name)))
      .htmlLat((d) => d.lat)
      .htmlLng((d) => d.lng)
      .htmlAltitude(0.02)
      .htmlElement((d) => {
        if (d.isPin) {
          const wrap = document.createElement("div");
          wrap.className = "search-pin";
          const dot = document.createElement("div");
          dot.className = "search-pin-dot";
          wrap.appendChild(dot);
          const lbl = document.createElement("div");
          lbl.className = "search-pin-label";
          lbl.textContent = d.name;
          wrap.appendChild(lbl);
          return wrap;
        }
        const el = document.createElement("div");
        el.className = "city-label";
        el.dataset.tz = d.tz;
        el.dataset.city = d.name;
        el.textContent = d.name;
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          fetchWeatherAt(d.lat, d.lng);
        });
        return el;
      });

    // Refresh city times every second
    setInterval(() => {
      document.querySelectorAll(".city-label").forEach((el) => {
        try {
          const t = new Intl.DateTimeFormat("en-GB", {
            hour: "2-digit",
            minute: "2-digit",
            hour12: false,
            timeZone: el.dataset.tz,
          }).format(new Date(dt));
          el.textContent = `${el.dataset.city} ${t}`;
        } catch (e) {
          /* unknown timezone, skip */
        }
      });
    }, 1000);

    // ── Shared single-location weather fetch ───────────────────────────────────
    async function fetchWeatherAt(lat, lng) {
      weatherCard.style.display = "none";
      weatherErr.style.display = "none";
      try {
        const res = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?lat=${lat.toFixed(4)}&lon=${lng.toFixed(4)}&appid=${OWM_KEY}&units=metric`,
        );
        const data = await res.json();
        if (!res.ok) {
          weatherErr.textContent = data.message || "No data for this location.";
          weatherErr.style.display = "block";
          return;
        }
        showWeatherCard(data, true);
      } catch (err) {
        weatherErr.textContent = `Network error — ${err.message || "check connection."}`;
        weatherErr.style.display = "block";
        console.error("fetchWeatherAt failed:", err);
      }
    }

    // Tooltip follows cursor
    document.addEventListener("mousemove", (e) => {
      tooltipEl.style.left = e.clientX + 14 + "px";
      tooltipEl.style.top = e.clientY + 14 + "px";
    });

    // ── Layer controls ─────────────────────────────────────────────────────────
    document.getElementById("controls-toggle").addEventListener("click", () => {
      document.getElementById("controls").classList.toggle("collapsed");
    });

    // Collapse controls by default on small screens
    if (window.innerWidth <= 600) {
      document.getElementById("controls").classList.add("collapsed");
    }

    document.getElementById("togWeather").addEventListener("change", (e) => {
      if (!weatherMesh) return;
      e.target.checked
        ? world.scene().add(weatherMesh)
        : world.scene().remove(weatherMesh);
    });

    document.getElementById("togCountries").addEventListener("change", (e) => {
      world.polygonsData(e.target.checked ? countriesData : []);
    });

    document.getElementById("togCities").addEventListener("change", () => {
      updateHtmlData();
      updatePointsData();
    });

    document.getElementById("weatherLayer").addEventListener("change", (e) => {
      loadWeather(e.target.value);
    });

    // ── City weather search ────────────────────────────────────────────────────
    const searchInput = document.getElementById("search-input");
    const searchBtn = document.getElementById("search-btn");
    const weatherCard = document.getElementById("weather-card");
    const weatherErr = document.getElementById("weather-error");
    const forecastPanel = document.getElementById("forecast-panel");
    const forecastBtn = document.getElementById("forecast-btn");

    document.getElementById("wc-close").addEventListener("click", () => {
      weatherCard.style.display = "none";
      weatherErr.style.display = "none";
      hideForecast();
    });

    // Track coords of the currently displayed city for the forecast fetch
    let currentCoords = null;

    // ── 5-day forecast ─────────────────────────────────────────────────────────
    const DOW = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    async function loadForecast(lat, lon) {
      forecastPanel.innerHTML =
        "<div style='color:#888;padding:4px 0'>Loading…</div>";
      forecastPanel.style.display = "block";
      forecastBtn.textContent = "5-Day Forecast ▴";

      try {
        const res = await fetch(
          `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${OWM_KEY}&units=metric`,
        );
        const data = await res.json();
        if (!res.ok) {
          forecastPanel.innerHTML = `<div style='color:#f88'>${data.message || "Forecast unavailable."}</div>`;
          return;
        }

        // Aggregate 3-hour slots into daily summaries (skip today)
        const today = new Date().toLocaleDateString("en-CA"); // YYYY-MM-DD
        const days = {};
        for (const slot of data.list) {
          const date = slot.dt_txt.slice(0, 10);
          if (date === today) continue;
          if (!days[date]) {
            days[date] = { temps: [], descs: [], icons: [] };
          }
          days[date].temps.push(slot.main.temp_min, slot.main.temp_max);
          days[date].descs.push(slot.weather[0].description);
          days[date].icons.push(slot.weather[0].icon);
        }

        const entries = Object.entries(days).slice(0, 5);
        if (!entries.length) {
          forecastPanel.innerHTML =
            "<div style='color:#888'>No forecast data.</div>";
          return;
        }

        forecastPanel.innerHTML = entries
          .map(([date, d]) => {
            const dow = DOW[new Date(date + "T12:00:00Z").getUTCDay()];
            const hi = Math.round(Math.max(...d.temps));
            const lo = Math.round(Math.min(...d.temps));
            // Pick most-frequent description
            const desc = d.descs.sort(
              (a, b) =>
                d.descs.filter((x) => x === b).length -
                d.descs.filter((x) => x === a).length,
            )[0];
            return `<div class="fc-day">
            <span class="fc-dow">${dow}</span>
            <span class="fc-desc">${desc}</span>
            <span class="fc-temps"><span class="fc-hi">${hi}°</span> / <span class="fc-lo">${lo}°</span></span>
          </div>`;
          })
          .join("");
      } catch {
        forecastPanel.innerHTML =
          "<div style='color:#f88'>Network error.</div>";
      }
    }

    function hideForecast() {
      forecastPanel.style.display = "none";
      forecastPanel.innerHTML = "";
      forecastBtn.textContent = "5-Day Forecast ▾";
    }

    forecastBtn.addEventListener("click", () => {
      if (forecastPanel.style.display === "block") {
        hideForecast();
      } else if (currentCoords) {
        loadForecast(currentCoords.lat, currentCoords.lon);
      }
    });

    // Shared: populate weather card from an OWM response object
    function showWeatherCard(data, flyTo = false) {
      // Store coords so the forecast button knows where to fetch
      currentCoords = { lat: data.coord.lat, lon: data.coord.lon };
      // Reset any open forecast from the previous location
      hideForecast();

      if (flyTo) {
        world.pointOfView(
          { lat: data.coord.lat, lng: data.coord.lon, altitude: 1.8 },
          1200,
        );
      }

      // Show a dot + temporary label if not already in the CITIES list
      const inList = CITIES.some(
        (c) =>
          Math.abs(c.lat - data.coord.lat) < 0.8 &&
          Math.abs(c.lng - data.coord.lon) < 0.8,
      );
      if (!inList) {
        searchPinCity = {
          name: `${data.name}, ${data.sys.country}`,
          lat: data.coord.lat,
          lng: data.coord.lon,
          isPin: true,
          _key: Date.now(),
        };
      } else {
        searchPinCity = null;
      }
      updateHtmlData();

      const localDate = new Date(Date.now() + data.timezone * 1000);
      const hh = String(localDate.getUTCHours()).padStart(2, "0");
      const mm = String(localDate.getUTCMinutes()).padStart(2, "0");

      document.getElementById("wc-city").textContent =
        `${data.name}, ${data.sys.country}`;
      document.getElementById("wc-desc").textContent =
        data.weather[0].description;
      document.getElementById("wc-temp").textContent =
        `${Math.round(data.main.temp)}°C  (${Math.round((data.main.temp * 9) / 5 + 32)}°F)`;
      document.getElementById("wc-feels").textContent =
        `${Math.round(data.main.feels_like)}°C`;
      document.getElementById("wc-humidity").textContent =
        `${data.main.humidity}%`;
      document.getElementById("wc-wind").textContent =
        `${Math.round(data.wind.speed * 3.6)} km/h`;
      document.getElementById("wc-vis").textContent = data.visibility
        ? `${(data.visibility / 1000).toFixed(1)} km`
        : "N/A";
      document.getElementById("wc-time").textContent = `${hh}:${mm}`;

      weatherErr.style.display = "none";
      weatherCard.style.display = "block";
    }

    async function searchCity() {
      const query = searchInput.value.trim();
      if (!query) return;

      weatherCard.style.display = "none";
      weatherErr.style.display = "none";
      searchBtn.textContent = "...";

      try {
        const res = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(query)}&appid=${OWM_KEY}&units=metric`,
        );
        const data = await res.json();

        if (!res.ok) {
          weatherErr.textContent = data.message || "City not found.";
          weatherErr.style.display = "block";
          return;
        }

        showWeatherCard(data, true);
      } catch {
        weatherErr.textContent = "Network error — check connection.";
        weatherErr.style.display = "block";
      } finally {
        searchBtn.textContent = "Go";
      }
    }

    // ── Double-click-to-weather ────────────────────────────────────────────────
    // Fires only on the second tap within 450ms (double-click / double-tap).
    // NOTE: onPolygonClick also forwards here because country polygon meshes sit
    // slightly above the globe surface and intercept the raycaster over all land.
    let clickTimer = null;
    let firstTapCoords = null;
    function handleMapTap(lat, lng) {
      if (clickTimer) {
        // Second tap — this is the double-click, proceed with lookup
        clearTimeout(clickTimer);
        clickTimer = null;
        firstTapCoords = null;
        fetchWeatherAt(lat, lng);
        return;
      }
      // First tap — wait to see if a second tap follows
      firstTapCoords = { lat, lng };
      clickTimer = setTimeout(() => {
        clickTimer = null;
        firstTapCoords = null;
      }, 450);
    }
    world.onGlobeClick(({ lat, lng }) => handleMapTap(lat, lng));

    searchBtn.addEventListener("click", searchCity);
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchCity();
    });

    // ── Init ───────────────────────────────────────────────────────────────────
    loadWeather("clouds_new");

    // Auto-refresh the weather overlay every 10 minutes
    setInterval(
      () => {
        const layer = document.getElementById("weatherLayer").value;
        loadWeather(layer);
      },
      10 * 60 * 1000,
    );
  </script>
</body>
